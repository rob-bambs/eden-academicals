<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eden Academicals FC — Season 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --orange: #f04e00;
    --orange-light: #fff0ea;
    --orange-mid: #ffd5c2;
    --bg: #f5f5f5;
    --surface: #ffffff;
    --border: #e8e8e8;
    --border-strong: #d0d0d0;
    --text: #111111;
    --muted: #767676;
    --subtle: #b0b0b0;
    --red: #d62828;
    --red-bg: #fff0f0;
    --yellow: #d97700;
    --yellow-bg: #fff8eb;
    --green: #1a7f4b;
    --green-bg: #edfaf3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 80px;
  }

  /* HEADER */
  header {
    padding: 36px 0 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 2px solid var(--orange);
    margin-bottom: 36px;
  }

  .crest {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    background: #fff;
    border-radius: 4px;
    padding: 5px;
    border: 1px solid var(--border);
  }

  .header-text { flex: 1; }

  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1;
    color: var(--text);
    text-transform: uppercase;
  }

  .header-text h1 span { color: var(--orange); }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 500;
  }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  .season-tag {
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
  }

  .league-tag {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* KPI ROW */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1px;
    margin-bottom: 36px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .kpi {
    background: var(--surface);
    padding: 22px 20px 18px;
    position: relative;
  }

  .kpi:first-child { border-left: 3px solid var(--orange); }

  .kpi-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -1px;
  }

  .kpi-value.loss { color: var(--red); }

  .kpi-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 5px;
    font-weight: 600;
  }

  /* SECTION TITLES */
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* RESULTS */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    margin-bottom: 40px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .result-card {
    background: var(--surface);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: background 0.15s;
  }

  .result-card:hover { background: #fafafa; }

  .result-date {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--subtle);
    font-weight: 600;
  }

  .result-opp {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .result-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }

  .result-score {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 2px;
    background: var(--red-bg);
    color: var(--red);
    letter-spacing: 0.3px;
  }

  .result-score.won {
    background: var(--green-bg);
    color: var(--green);
  }

  .result-score.tbd {
    background: var(--bg);
    color: var(--subtle);
  }

  .result-location {
    font-size: 10px;
    color: var(--subtle);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }

  .comp-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
    margin-bottom: 4px;
    width: fit-content;
  }
  .comp-league { background: #e8f0fe; color: #1a56db; }
  .comp-leaguecup { background: #fff0ea; color: var(--orange); }
  .comp-countycup { background: var(--green-bg); color: var(--green); }

  /* CHARTS GRID */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }

  @media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
  }

  .chart-card.full { grid-column: 1 / -1; }

  .chart-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* ATTENDANCE */
  .attendance-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }

  .attendance-row:last-child { border-bottom: none; }

  .att-name {
    width: 150px;
    font-size: 13px;
    color: var(--text);
    flex-shrink: 0;
    font-weight: 500;
  }

  .att-bar-wrap {
    flex: 1;
    background: var(--border);
    border-radius: 0;
    height: 4px;
  }

  .att-bar {
    height: 100%;
    background: var(--orange);
    border-radius: 0;
  }

  .att-count {
    font-size: 11px;
    color: var(--muted);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
    font-weight: 600;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    width: fit-content;
  }

  .tab {
    padding: 7px 18px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    border-right: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    transition: all 0.12s;
  }

  .tab:last-child { border-right: none; }

  .tab.active {
    background: var(--orange);
    color: #fff;
  }

  .tab:not(.active):hover { background: var(--bg); }

  .player-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .player-table th {
    background: var(--bg);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 11px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.12s;
  }

  .player-table th:hover { color: var(--orange); }
  .player-table th.sort-asc::after { content: ' ↑'; color: var(--orange); }
  .player-table th.sort-desc::after { content: ' ↓'; color: var(--orange); }

  .player-table td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .player-table tr:last-child td { border-bottom: none; }
  .player-table tr:hover td { background: #fafafa; }
  .player-name { font-weight: 500; }

  .stat-pill {
    display: inline-block;
    min-width: 22px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 2px;
  }

  .pill-goal { background: var(--orange-light); color: var(--orange); }
  .pill-assist { background: var(--yellow-bg); color: var(--yellow); }
  .pill-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-sin-bin { background: #f3f0ff; color: #5b21b6; }
  .pill-motm { background: var(--bg); color: var(--text); }
  .pill-app { background: var(--bg); color: var(--muted); font-weight: 600; }
  .pill-zero { color: var(--subtle); }
</style>
</head>

  <div class="section-title">Player Statistics</div>
  <div class="tab-bar">
    <button class="tab active" onclick="filterTable('all',this)">All</button>
    <button class="tab" onclick="filterTable('played',this)">Played</button>
    <button class="tab" onclick="filterTable('goals',this)">Goalscorers</button>
  </div>
  <div class="table-wrap">
    <table class="player-table">
      <thead>
        <tr>
          <th onclick="sortTable('name')" id="th-name">Player</th>
          <th onclick="sortTable('appearances')" id="th-appearances">Apps</th>
          <th onclick="sortTable('goals')" id="th-goals">Goals</th>
          <th onclick="sortTable('assists')" id="th-assists">Assists</th>
          <th onclick="sortTable('yellow_cards')" id="th-yellow_cards">Yellow</th>
          <th onclick="sortTable('red_cards')" id="th-red_cards">Red</th>
          <th onclick="sortTable('sin_bin')" id="th-sin_bin">Sin Bin</th>
          <th onclick="sortTable('motm')" id="th-motm">MoTM</th>
        </tr>
      </thead>
      <tbody id="player-tbody"></tbody>
    </table>
  </div>

</div>
<script>
const players = [
  {name:"Adrian Russell",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Andy Reilly",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Carl Stewart",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Dave Martindale",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Dean Metcalfe",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Duncan Hall",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"Gary Jaques",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Graham Atkinson",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"James Humphreys",goals:1,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:1,appearances:2},
  {name:"Jamie Clague",goals:0,assists:1,yellow_cards:0,red_cards:0,sin_bin:0,motm:1,appearances:1},
  {name:"John Allinson",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"Jude Hodson",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Lee Clarke",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"Llew Gibbs",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Luke Sinclair",goals:1,assists:1,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Marcel McLean",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"Michal Badocha",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Nick Barker",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Paul Fraser",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"Ric Armstrong",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Rob Bamber",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1},
  {name:"Rob Bland",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Ryan Smith",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Scott Sowerby",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:2},
  {name:"Stu Forrester",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Tim Jackson",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:0},
  {name:"Tom Harding",goals:0,assists:0,yellow_cards:0,red_cards:0,sin_bin:0,motm:0,appearances:1}
];

const matches = [
  {date:"13 Apr 2026",opposition:"Museum",score:"Lost 5-1",home_away:"Home",competition:"League",goals_for:1,goals_against:5},
  {date:"20 Apr 2026",opposition:"Northbank",score:"Lost 6-1",home_away:"Away",competition:"League",goals_for:1,goals_against:6},
  {date:"27 Apr 2026",opposition:"Northbank",score:"TBD",home_away:"Away",competition:"County Cup",goals_for:null,goals_against:null},
  {date:"5 May 2026",opposition:"Silloth",score:"TBD",home_away:"Away",competition:"League",goals_for:null,goals_against:null}
];

const totalGoals = players.reduce((s,p)=>s+p.goals,0);
const totalMoTM = players.reduce((s,p)=>s+p.motm,0);
const played = matches.filter(m=>m.score!=="TBD").length;
const losses = matches.filter(m=>m.score.startsWith("Lost")).length;
const squadSize = players.filter(p=>p.appearances>0).length;
const goalsConceded = matches.filter(m=>m.goals_against!==null).reduce((s,m)=>s+m.goals_against,0);

const kpis = [
  {label:"Played",value:played,cls:""},
  {label:"Losses",value:losses,cls:"loss"},
  {label:"Goals For",value:totalGoals,cls:""},
  {label:"Goals Against",value:goalsConceded,cls:"loss"},
  {label:"Man of Match",value:totalMoTM,cls:""},
  {label:"Squad Used",value:squadSize,cls:""},
];

document.getElementById("kpi-row").innerHTML = kpis.map(k=>`
  <div class="kpi">
    <div class="kpi-value ${k.cls}">${k.value}</div>
    <div class="kpi-label">${k.label}</div>
  </div>`).join("");

document.getElementById("results-grid").innerHTML = matches.map(m=>{
  let cls = "tbd";
  if(m.score.startsWith("Won")) cls="won";
  else if(m.score.startsWith("Lost")) cls="";
  const compClass = m.competition==="League" ? "comp-league" : m.competition==="League Cup" ? "comp-leaguecup" : "comp-countycup";
  return `<div class="result-card">
    <span class="comp-badge ${compClass}">${m.competition}</span>
    <div class="result-date">${m.date}</div>
    <div class="result-opp">${m.opposition}</div>
    <div class="result-meta">
      <span class="result-score ${cls}">${m.score}</span>
      <span class="result-location">${m.home_away}</span>
    </div>
  </div>`;
}).join("");

const topPlayers = [...players].filter(p=>p.goals>0||p.assists>0).sort((a,b)=>(b.goals+b.assists)-(a.goals+a.assists));
const allWithApps = [...players].filter(p=>p.appearances>0).sort((a,b)=>b.appearances-a.appearances).slice(0,10);
const chartPlayers = topPlayers.length ? topPlayers : allWithApps;

const chartDefaults = { responsive:true, maintainAspectRatio:false };
const gridColor = "#eeeeee";
const tickColor = "#aaaaaa";
const fontFamily = "Inter";

new Chart(document.getElementById("goalChart"), {
  type:"bar",
  data:{
    labels: chartPlayers.map(p=>p.name.split(" ").pop()),
    datasets:[
      { label:"Goals", data:chartPlayers.map(p=>p.goals), backgroundColor:"#f04e00", borderRadius:2 },
      { label:"Assists", data:chartPlayers.map(p=>p.assists), backgroundColor:"#3d3d3d", borderRadius:2 }
    ]
  },
  options:{...chartDefaults, plugins:{legend:{labels:{color:tickColor,font:{family:fontFamily,size:12}}}},
    scales:{x:{ticks:{color:tickColor},grid:{color:gridColor}},y:{ticks:{color:tickColor,stepSize:1},grid:{color:gridColor},beginAtZero:true}}}
});

const completedMatches = matches.filter(m=>m.score!=="TBD");
new Chart(document.getElementById("goalsPerMatch"), {
  type:"line",
  data:{
    labels:completedMatches.map(m=>m.opposition),
    datasets:[
      { label:"For", data:completedMatches.map(m=>m.goals_for), borderColor:"#1a7f4b", backgroundColor:"rgba(26,127,75,0.07)", fill:true, tension:0.3, pointBackgroundColor:"#1a7f4b", pointRadius:5, borderWidth:2 },
      { label:"Against", data:completedMatches.map(m=>m.goals_against), borderColor:"#d62828", backgroundColor:"rgba(214,40,40,0.05)", fill:true, tension:0.3, pointBackgroundColor:"#d62828", pointRadius:5, borderWidth:2 }
    ]
  },
  options:{...chartDefaults, plugins:{legend:{labels:{color:tickColor,font:{family:fontFamily,size:11}}}},
    scales:{x:{ticks:{color:tickColor},grid:{color:gridColor}},y:{ticks:{color:tickColor,stepSize:1},grid:{color:gridColor},beginAtZero:true}}}
});

const totalYellow = players.reduce((s,p)=>s+p.yellow_cards,0);
const totalRed = players.reduce((s,p)=>s+p.red_cards,0);
const cleanPlayers = players.filter(p=>p.appearances>0&&p.yellow_cards===0&&p.red_cards===0).length;
new Chart(document.getElementById("disciplineChart"), {
  type:"doughnut",
  data:{
    labels:["Clean","Yellow Cards","Red Cards"],
    datasets:[{
      data:[cleanPlayers, totalYellow||0.01, totalRed||0.01],
      backgroundColor:["#e0e0e0","#f5c300","#d62828"],
      borderColor:"#ffffff", borderWidth:3
    }]
  },
  options:{...chartDefaults, plugins:{legend:{position:"bottom",labels:{color:tickColor,font:{family:fontFamily,size:11},padding:16}}}, cutout:"68%"}
});

const sorted = [...players].filter(p=>p.appearances>0).sort((a,b)=>b.appearances-a.appearances);
const maxApp = Math.max(...sorted.map(p=>p.appearances));
document.getElementById("attendance-bars").innerHTML = sorted.map(p=>`
  <div class="attendance-row">
    <div class="att-name">${p.name}</div>
    <div class="att-bar-wrap"><div class="att-bar" style="width:${(p.appearances/maxApp)*100}%"></div></div>
    <div class="att-count">${p.appearances}/${played}</div>
  </div>`).join("");

let currentFilter="all", sortKey="appearances", sortDir=-1;

function filterTable(filter, btn) {
  currentFilter=filter;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}

function sortTable(key) {
  if(sortKey===key) sortDir*=-1; else {sortKey=key; sortDir=-1;}
  document.querySelectorAll("[id^=\"th-\"]").forEach(th=>th.className="");
  document.getElementById("th-"+key).className = sortDir===-1?"sort-desc":"sort-asc";
  renderTable();
}

function renderTable() {
  let data=[...players];
  if(currentFilter==="played") data=data.filter(p=>p.appearances>0);
  if(currentFilter==="goals") data=data.filter(p=>p.goals>0||p.assists>0);
  data.sort((a,b)=>{
    const av=a[sortKey],bv=b[sortKey];
    if(typeof av==="string") return av.localeCompare(bv)*sortDir;
    return (bv-av)*(sortDir===-1?1:-1);
  });
  function pill(val,cls) {
    if(val===0) return `<span class="pill-zero">—</span>`;
    return `<span class="stat-pill ${cls}">${val}</span>`;
  }
  document.getElementById("player-tbody").innerHTML = data.map(p=>`
    <tr>
      <td class="player-name">${p.name}</td>
      <td>${pill(p.appearances,"pill-app")}</td>
      <td>${pill(p.goals,"pill-goal")}</td>
      <td>${pill(p.assists,"pill-assist")}</td>
      <td>${pill(p.yellow_cards,"pill-yellow")}</td>
      <td>${pill(p.red_cards,"pill-red")}</td>
      <td>${pill(p.sin_bin,"pill-sin-bin")}</td>
      <td>${pill(p.motm,"pill-motm")}</td>
    </tr>`).join("");
}

document.getElementById("th-appearances").className="sort-desc";
renderTable();
</script>
</body>
</html>
